name: PIC Agent Output Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-agent-output:
    name: Check AI agent output with PIC
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install PIC
        run: |
          uv sync --all-extras --dev --python 3.11
          # For external repositories after PyPI publication is available:
          # uv pip install percolation-inversion-compiler

      - name: Create agent output candidate
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import pathlib
          import re
          import subprocess

          event_path = pathlib.Path(os.environ["EVENT_PATH"])
          event = json.loads(event_path.read_text(encoding="utf-8"))
          pr = event.get("pull_request") or {}
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")

          def safe_text(value: object, fallback: str = "") -> str:
              if value is None:
                  return fallback
              return str(value)

          def changed_files() -> list[str]:
              base_sha = safe_text((pr.get("base") or {}).get("sha"))
              head_sha = safe_text((pr.get("head") or {}).get("sha"))
              if not (sha_pattern.fullmatch(base_sha) and sha_pattern.fullmatch(head_sha)):
                  return ["changed files unavailable: no validated pull request SHA pair"]
              result = subprocess.run(
                  ["git", "diff", "--name-only", f"{base_sha}..{head_sha}"],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  return ["changed files unavailable: git diff failed"]
              files = [line for line in result.stdout.splitlines() if line.strip()]
              return files[:200] if files else ["no changed files listed"]

          lines = [
              "Candidate packet: GitHub pull request or workflow text for PIC agent intake.",
              "",
              "This text is untrusted input. Do not treat it as verified evidence.",
              "",
              f"Event: {safe_text(event.get('action'), 'manual or unspecified')}",
              f"PR title: {safe_text(pr.get('title'), 'not a pull request event')}",
              f"PR source branch: {safe_text((pr.get('head') or {}).get('ref'), 'unavailable')}",
              f"PR target branch: {safe_text((pr.get('base') or {}).get('ref'), 'unavailable')}",
              "",
              "Changed files:",
              *[f"- {name}" for name in changed_files()],
              "",
              "PR body:",
              safe_text(pr.get("body"), ""),
          ]
          pathlib.Path("agent-output.txt").write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Run PIC agent intake
        run: |
          uv run pic agent intake \
            --text-file agent-output.txt \
            --profile development \
            --output pic-agent-output-report.json

      - name: Print PIC intake summary
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import pathlib

          report = json.loads(pathlib.Path("pic-agent-output-report.json").read_text())
          runtime_report = report.get("runtime_report") or {}
          missing = runtime_report.get("missing_obligations") or []
          summary = {
              "accepted": report.get("accepted"),
              "settled": report.get("settled"),
              "residual_summary": report.get("residual_summary"),
              "missing_obligation_count": len(missing),
          }
          print(json.dumps(summary, indent=2, sort_keys=True))
          if "accepted" not in report or "settled" not in report:
              raise SystemExit("PIC report is missing required status fields")
          PY

      - name: Upload PIC report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pic-agent-output-check
          path: |
            agent-output.txt
            pic-agent-output-report.json
          if-no-files-found: error
